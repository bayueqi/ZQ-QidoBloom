<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琪窦初开</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- GitHub链接 -->
    <a href="https://github.com/BAYUEQI/ZQ-QidoBloom" class="github-link" target="_blank" title="GitHub仓库">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
            <path d="M9 18c-4.51 2-5-2-7-2"></path>
        </svg>
    </a>

    <!-- 右上角按钮 -->
    <div class="top-right">
            <!-- 管理按钮 -->
            <div class="manage-dropdown dropdown-container">
                <button class="manage-button action-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                    <span>管理</span>
                </button>
                <div class="manage-dropdown-menu">
                    <a href="#" class="dropdown-item" data-action="groups">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18"></path>
                            <path d="M3 12h18"></path>
                            <path d="M3 18h18"></path>
                        </svg>
                        <span>分组管理</span>
                    </a>
                    <a href="#" class="dropdown-item" data-action="wallpaper">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>壁纸设置</span>
                    </a>
                    <a href="#" class="dropdown-item" data-action="search-engines">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <span>搜索引擎</span>
                    </a>
                    <a href="#" class="dropdown-item" data-action="export-config">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        <span>导出配置</span>
                    </a>
                    <a href="#" class="dropdown-item" data-action="import-config">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span>导入配置</span>
                    </a>
                </div>
            </div>
        </div>

    <div class="container">
        <!-- 时间和日期显示 -->
        <div class="time-date">
            <div id="time" class="time">00:00:00</div>
            <div id="date" class="date">2024年1月1日 星期一</div>
        </div>

        <!-- 搜索框 -->
        <div class="new-search-container">
            <form id="new-search-form" class="new-search-form">
                <div class="search-engine-selector">
                    <div class="selected-engine">
                        <span id="current-engine">必应</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="engine-dropdown">
                        <div class="engine-option" data-engine="bing">必应</div>
                        <div class="engine-option" data-engine="google">Google</div>
                        <div class="engine-option" data-engine="baidu">百度</div>
                    </div>
                </div>
                <input type="text" id="new-search-input" class="new-search-input" placeholder="搜索...">
                <button type="submit" class="new-search-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
        </div>

        <!-- 常用网站快捷方式 -->
        <div class="shortcuts"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
